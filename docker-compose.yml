services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aqsoft}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aqsoft}
      POSTGRES_DB: ${POSTGRES_DB:-aqsoft_health}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6380}:6379"

  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8090}:8080"
    env_file: ./backend/.env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload

  worker:
    build: ./backend
    env_file: ./backend/.env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    command: arq app.workers.ingestion_worker.WorkerSettings

volumes:
  pgdata:
