name: aqsoft_health
version: '1.0.0'

profile: 'aqsoft_health'

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]

vars:
  # Tuva configuration
  cms_hcc_payment_year: 2026

  # Enable all claims-based Tuva marts (core + downstream)
  claims_enabled: true

  # HCC marts rely only on claims-derived HCC suspects → safe to enable.
  hcc_recapture_enabled: true
  hcc_suspecting_enabled: true

  # Provider attribution + clinical marts require source tables we don't
  # yet export (provider_attribution, appointment, location, practitioner,
  # medication_administration, ...). Turning either on forces Tuva to
  # compile models that ref unsupplied nodes. Leave both false until the
  # corresponding input surfaces are complete. See
  # reviews/phase-tuva-deepening.md for the wiring checklist.
  clinical_enabled: false
  provider_attribution_enabled: false

  # Input layer
  input_database: aqsoft_health
  input_schema: raw

  # Tuva seed version
  tuva_seed_version: "0.18.0"

# Suppress ref-resolution warnings (Tuva refs resolve to our root models)
flags:
  require_ref_prefers_node_package_to_root: True
