name: aqsoft_health
version: '1.0.0'

profile: 'aqsoft_health'

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]

vars:
  # Tuva configuration
  cms_hcc_payment_year: 2026

  # Enable all claims-based Tuva marts (core + downstream)
  claims_enabled: true

  # Input layer
  input_database: aqsoft_health
  input_schema: raw

  # Tuva seed version
  tuva_seed_version: "0.18.0"

# Suppress ref-resolution warnings (Tuva refs resolve to our root models)
flags:
  require_ref_prefers_node_package_to_root: True
